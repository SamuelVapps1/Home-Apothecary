<!-- @dsCard group="Type" viewport="700x140" name="Labels & Tags" subtitle="Tracked uppercase labels, badge text, button copy" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-app); padding: 18px 24px; font-family: var(--font-body); }
    .items { display: flex; gap: 32px; flex-wrap: wrap; }
    .item { display: flex; flex-direction: column; gap: 6px; }
    .meta { font-size: 8px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="items">
    <div class="item">
      <div class="meta">Filter Category Label</div>
      <span style="font-family:var(--font-body); font-size:12px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-secondary);">Digestive</span>
    </div>
    <div class="item">
      <div class="meta">Active Filter (amber)</div>
      <span style="font-family:var(--font-body); font-size:12px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--color-amber-400);">Sleep</span>
    </div>
    <div class="item">
      <div class="meta">Button Copy</div>
      <span style="font-family:var(--font-body); font-size:11.5px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:#1a1000; background:var(--color-amber-500); padding:8px 18px; border-radius:var(--radius-md);">Add to Cabinet</span>
    </div>
    <div class="item">
      <div class="meta">Badge Pill</div>
      <span style="font-family:var(--font-body); font-size:10px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--color-sage-300); background:rgba(122,158,122,0.17); border:1px solid rgba(122,158,122,0.35); padding:3px 10px; border-radius:999px;">Immunity</span>
    </div>
    <div class="item">
      <div class="meta">Section Eyebrow</div>
      <span style="font-family:var(--font-body); font-size:9px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-muted);">5 remedies</span>
    </div>
    <div class="item">
      <div class="meta">Nav Label</div>
      <span style="font-family:var(--font-body); font-size:9px; font-weight:400; letter-spacing:0.1em; text-transform:uppercase; color:var(--color-amber-400);">Home</span>
    </div>
  </div>
</body>
</html>
