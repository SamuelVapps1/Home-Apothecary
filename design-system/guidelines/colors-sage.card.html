<!-- @dsCard group="Colors" viewport="700x150" name="Sage Green" subtitle="Secondary accent — dried herbs, category tags" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-app); padding: 12px; font-family: var(--font-body); }
    .row { display: flex; gap: 8px; height: 126px; }
    .swatch { flex: 1; border-radius: 7px; overflow: hidden; position: relative; }
    .color { height: 100%; width: 100%; }
    .info { position: absolute; bottom: 0; left: 0; right: 0; padding: 7px 8px; background: rgba(0,0,0,0.5); }
    .role { font-size: 8.5px; color: #c4b896; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px; }
    .token { font-size: 8px; color: #f0e8d0; font-family: 'Courier New', monospace; margin-bottom: 1px; }
    .hex { font-size: 9px; color: #aacfaa; font-family: 'Courier New', monospace; }
  </style>
</head>
<body>
  <div class="row">
    <div class="swatch">
      <div class="color" style="background:#aacfaa"></div>
      <div class="info"><div class="role">Sage 200</div><div class="token">--color-sage-200</div><div class="hex">#aacfaa</div></div>
    </div>
    <div class="swatch">
      <div class="color" style="background:#94b894"></div>
      <div class="info"><div class="role">Sage 300</div><div class="token">--color-sage-300</div><div class="hex">#94b894</div></div>
    </div>
    <div class="swatch" style="box-shadow:0 0 0 2px #7a9e7a">
      <div class="color" style="background:#7a9e7a"></div>
      <div class="info"><div class="role">★ Secondary Accent</div><div class="token">--accent-secondary</div><div class="hex">#7a9e7a</div></div>
    </div>
    <div class="swatch">
      <div class="color" style="background:#5a7a5a"></div>
      <div class="info"><div class="role">Sage 500</div><div class="token">--color-sage-500</div><div class="hex">#5a7a5a</div></div>
    </div>
    <div class="swatch">
      <div class="color" style="background:#3d5a3d"></div>
      <div class="info"><div class="role">Sage 600</div><div class="token">--color-sage-600</div><div class="hex">#3d5a3d</div></div>
    </div>
    <div class="swatch">
      <div class="color" style="background:#28402a"></div>
      <div class="info"><div class="role">Sage 700</div><div class="token">--color-sage-700</div><div class="hex">#28402a</div></div>
    </div>
  </div>
</body>
</html>
