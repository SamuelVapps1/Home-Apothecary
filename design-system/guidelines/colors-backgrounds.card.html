<!-- @dsCard group="Colors" viewport="700x150" name="Dark Backgrounds" subtitle="Forest green app background scale" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0c130c; padding: 12px; font-family: var(--font-body); }
    .row { display: flex; gap: 8px; height: 126px; }
    .swatch { flex: 1; border-radius: 7px; overflow: hidden; position: relative; }
    .color { height: 100%; width: 100%; }
    .info { position: absolute; bottom: 0; left: 0; right: 0; padding: 7px 8px; background: rgba(0,0,0,0.55); }
    .role { font-size: 8.5px; color: #a89874; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px; }
    .token { font-size: 8px; color: #c9973a; font-family: 'Courier New', monospace; margin-bottom: 1px; }
    .hex { font-size: 9px; color: #f0e8d0; font-family: 'Courier New', monospace; }
  </style>
</head>
<body>
  <div class="row">
    <div class="swatch">
      <div class="color" style="background:#111a11"></div>
      <div class="info"><div class="role">Header/Nav</div><div class="token">--color-forest-950</div><div class="hex">#111a11</div></div>
    </div>
    <div class="swatch">
      <div class="color" style="background:#1a2e1a"></div>
      <div class="info"><div class="role">App BG</div><div class="token">--bg-app</div><div class="hex">#1a2e1a</div></div>
    </div>
    <div class="swatch">
      <div class="color" style="background:#1e2d1e"></div>
      <div class="info"><div class="role">Card Surface</div><div class="token">--bg-card</div><div class="hex">#1e2d1e</div></div>
    </div>
    <div class="swatch">
      <div class="color" style="background:#243324"></div>
      <div class="info"><div class="role">Elevated Card</div><div class="token">--bg-card-elevated</div><div class="hex">#243324</div></div>
    </div>
    <div class="swatch">
      <div class="color" style="background:#2e3f2e"></div>
      <div class="info"><div class="role">Forest 700</div><div class="token">--color-forest-700</div><div class="hex">#2e3f2e</div></div>
    </div>
    <div class="swatch">
      <div class="color" style="background:#3d5c3d"></div>
      <div class="info"><div class="role">Forest 600</div><div class="token">--color-forest-600</div><div class="hex">#3d5c3d</div></div>
    </div>
  </div>
</body>
</html>
